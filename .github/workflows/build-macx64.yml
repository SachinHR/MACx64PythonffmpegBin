name: Build macOS x64 Runtime

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Verify Architecture
        run: |
          uname -m
          python -c "import platform; print(platform.machine())"

      - name: Create Runtime Folder
        run: |
          mkdir -p runtime/mac-x64

      - name: Create Python Runtime
        run: |
          python -m venv runtime/mac-x64/python

      - name: Install ffmpeg
        run: |
          brew install ffmpeg
          cp $(which ffmpeg) runtime/mac-x64/ffmpeg

      - name: Verify Runtime
        run: |
          file runtime/mac-x64/python/bin/python
          file runtime/mac-x64/ffmpeg

      - name: Upload Runtime
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64-runtime
          path: runtime/mac-x64